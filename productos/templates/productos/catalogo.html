{% extends 'productos/base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
    .catalogo-container {
        padding: 50px 20px;
        background-color: #fcf8f2; 
        min-height: 100vh;
    }

    .titulo-catalogo {
        font-family: 'Sacramento', cursive;
        font-size: clamp(50px, 8vw, 80px);
        color: #d63384;
        text-align: center;
        margin-bottom: 5px;
    }

    .subtitulo-catalogo {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        text-align: center;
        color: #8d6e63;
        font-size: 20px;
        margin-bottom: 30px;
    }

    
    .hr-vintage {
        border: 0;
        height: 2px;
        background-image: linear-gradient(to right, transparent, #f4d1d1, transparent);
        margin-bottom: 50px;
    }

    
    .grid-pasteles {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
    }

    
    .card-pastel {
        background: #ffffff;
        padding: 15px;
        border-radius: 20px;
        border: 1px solid #f4d1d1;
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        text-align: center;
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card-pastel:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(244, 209, 209, 0.5);
    }

    
    .contenedor-img {
        width: 100%;
        height: 200px; 
        overflow: hidden;
        border-radius: 15px;
        margin-bottom: 15px;
        border: 2px solid #fff5f5;
    }

    .contenedor-img img {
        width: 100%;
        height: 100%;
        object-fit: cover; 
        transition: transform 0.5s ease;
    }

    .card-pastel:hover .contenedor-img img {
        transform: scale(1.1);
    }

    .card-pastel h3 {
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        color: #5d4037;
        font-size: 22px;
        margin: 10px 0;
    }

    .card-pastel p {
        font-family: 'Quicksand', sans-serif;
        color: #888;
        font-size: 14px;
        margin-bottom: 15px;
    }

    .precio {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        color: #d63384;
        font-weight: bold;
        margin-bottom: 20px;
        display: block;
    }

    
    .btn-personalizar {
        background-color: #f4d1d1;
        color: white;
        border: 2px solid #ffffff;
        padding: 10px 20px;
        border-radius: 50px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-decoration: none;
        display: inline-block;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
    }

    .btn-personalizar:hover {
        background-color: #d63384;
        color: white;
        transform: scale(1.05);
    }
</style>

<div class="catalogo-container">
    <h2 class="titulo-catalogo">🎂 Catálogo de Pasteles</h2>
    <p class="subtitulo-catalogo">Elige tu pastel favorito y personalízalo con amor 💖</p>
    <hr class="hr-vintage">

    <div class="grid-pasteles">
        {% for producto in productos %}
        <div class="card-pastel">
            <div>
                <div class="contenedor-img">
                    <img src="{{ producto.imagen }}" alt="{{ producto.nombre }}">
                </div>
                <h3>{{ producto.nombre }}</h3>
                <p>{{ producto.descripcion }}</p>
            </div>
            
            <div>
                <span class="precio">${{ producto.precio }}</span>
                <a href="{% url 'personalizar' producto.id %}" class="btn-personalizar">
                    Personalizar 🎂
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
