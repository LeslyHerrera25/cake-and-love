{% extends 'productos/base.html' %}

{% block content %}

<style>
.login-container {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(rgba(255,192,203,0.4), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1559620192-032c4bc4674e') no-repeat center;
    background-size: cover;
}

.login-box {
    background: rgba(255, 255, 255, 0.9);
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.login-box h2 {
    color: var(--rosa-fuerte);
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.login-box button {
    width: 100%;
    padding: 12px;
    background: var(--rosa);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.login-box button:hover {
    background: var(--rosa-fuerte);
}
</style>

<div class="login-container">

    <div class="login-box">
        <h2>💖 Bienvenida</h2>

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Usuario" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <button type="submit">Entrar ✨</button>
        </form>

    </div>

</div>

{% endblock %}
